<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="TNA Admin"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#181b1f"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="https://res.cloudinary.com/djg4tmkyb/image/upload/v1779635647/logo_aaf0ki.jpg"/>
<title>TNA Pro Build — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--dark:#181b1f;--mid:#232830;--card:#2a3038;--border:#333d47;--red:#cc2222;--red2:#a81b1b;--green:#22cc66;--yellow:#f0a500;--blue:#2266cc;--white:#fff;--silver:#b0b8c1;--muted:#8a9299}
html,body{height:100%;background:var(--dark);color:#e8eaed;font-family:'Segoe UI',Arial,sans-serif;overflow-x:hidden}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--mid);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.login-logo svg{width:48px;height:48px;margin-bottom:1rem}
.login-box h1{font-size:1.3rem;font-weight:800;color:var(--white);margin-bottom:.3rem}
.login-box p{color:var(--muted);font-size:.85rem;margin-bottom:2rem}
.login-box input{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--white);padding:.9rem 1rem;border-radius:8px;font-size:1rem;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:var(--red)}
.login-btn{width:100%;background:var(--red);color:var(--white);border:none;padding:1rem;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
.login-error{color:var(--red);font-size:.85rem;margin-top:.75rem;display:none}

/* APP */
#app{display:none;min-height:100vh;padding-bottom:80px}
.topbar{background:var(--mid);border-bottom:1px solid var(--border);padding:.9rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:.6rem}
.topbar h2{font-size:1rem;font-weight:700;color:var(--white)}
.icon-btn{background:none;border:none;color:var(--silver);font-size:1.2rem;cursor:pointer;padding:.3rem;border-radius:6px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--mid);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem .3rem;cursor:pointer;border:none;background:none;color:var(--muted);font-size:.62rem;gap:.2rem}
.nav-item.active{color:var(--red)}
.nav-item span:first-child{font-size:1.2rem}
.page{display:none;padding:1rem}
.page.active{display:block}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;text-align:center}
.stat-card .num{font-size:1.8rem;font-weight:800;color:var(--red)}
.stat-card .lbl{font-size:.72rem;color:var(--muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:.05em}
.stat-card.green .num{color:var(--green)}
.stat-card.yellow .num{color:var(--yellow)}
.stat-card.blue .num{color:var(--blue)}
.section-title{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;margin-top:1.25rem}

/* JOB CARDS */
.job-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.75rem;cursor:pointer;transition:border-color .2s}
.job-card:hover{border-color:var(--red)}
.job-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.4rem}
.job-card h3{font-size:.95rem;font-weight:700;color:var(--white)}
.status-badge{font-size:.65rem;font-weight:700;padding:.2rem .6rem;border-radius:30px;text-transform:uppercase;white-space:nowrap}
.status-lead{background:rgba(240,165,0,.15);color:var(--yellow)}
.status-quoted{background:rgba(34,102,204,.15);color:var(--blue)}
.status-active{background:rgba(204,34,34,.15);color:var(--red)}
.status-complete{background:rgba(34,204,102,.15);color:var(--green)}
.job-card p{font-size:.82rem;color:var(--muted)}
.job-card-bottom{display:flex;justify-content:space-between;margin-top:.6rem}
.job-card-bottom span{font-size:.78rem;color:var(--muted)}
.job-card-bottom strong{color:var(--green);font-size:.82rem}

/* FORMS */
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--white);padding:.8rem 1rem;border-radius:8px;font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--red)}
.form-group select option{background:var(--dark)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.8rem 1.25rem;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;width:100%;margin-bottom:.5rem}
.btn-primary{background:var(--red);color:var(--white)}
.btn-primary:hover{background:var(--red2)}
.btn-secondary{background:var(--border);color:var(--white)}
.btn-success{background:var(--green);color:#111}
.btn-blue{background:var(--blue);color:var(--white)}
.btn-orange{background:#e07000;color:var(--white)}
.btn-sm{padding:.5rem .9rem;font-size:.8rem;width:auto;margin-bottom:0}
.btn-outline{background:none;border:1px solid var(--border);color:var(--silver)}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--mid);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:93vh;overflow-y:auto;padding:1.5rem;border:1px solid var(--border)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-header h3{font-size:1.1rem;font-weight:700;color:var(--white)}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1}

/* DETAIL */
.detail-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.75rem}
.detail-section h4{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-row span:first-child{font-size:.82rem;color:var(--muted);flex-shrink:0}
.detail-row span:last-child{font-size:.85rem;color:var(--white);font-weight:600;text-align:right;max-width:65%}

/* LIST ITEMS */
.list-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.list-item:active{border-color:var(--red)}
.list-item-left h4{font-size:.88rem;font-weight:600;color:var(--white)}
.list-item-left p{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.list-item-right{text-align:right;flex-shrink:0;margin-left:.5rem}
.list-item-right strong{color:var(--red);font-size:.9rem;display:block}
.list-item-right span{font-size:.72rem;color:var(--muted)}
.amount-green{color:var(--green)!important}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.75rem}
.photo-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--dark);border:1px solid var(--border);position:relative}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-add-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.4rem;color:var(--muted);cursor:pointer;border:2px dashed var(--border);border-radius:8px;aspect-ratio:1;gap:.2rem;font-size:.7rem}
.photo-add-btn:active{border-color:var(--red);color:var(--red)}

/* MISC */
.search-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;width:100%;color:var(--white);font-size:.9rem;margin-bottom:1rem;outline:none}
.search-bar::placeholder{color:var(--muted)}
.search-bar:focus{border-color:var(--red)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state span{font-size:2.5rem;display:block;margin-bottom:.75rem}
.empty-state p{font-size:.9rem}
.fab{position:fixed;bottom:90px;right:1.25rem;width:56px;height:56px;background:var(--red);border-radius:50%;border:none;color:var(--white);font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(204,34,34,.5);z-index:90;display:flex;align-items:center;justify-content:center}
.tabs{display:inline-flex;background:var(--card);border-radius:10px;padding:.3rem;margin-bottom:1rem;gap:.3rem;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:.5rem 1.1rem;border-radius:7px;border:none;background:none;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--red);color:var(--white)}
.profit-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.75rem}
.profit-bar h4{font-size:.8rem;color:var(--muted);margin-bottom:.5rem}
.profit-bar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:.5rem}
.profit-bar-fill{height:100%;background:var(--green);border-radius:4px}
.profit-bar-nums{display:flex;justify-content:space-between;font-size:.72rem;flex-wrap:wrap;gap:.3rem}
.profit-bar-nums span{color:var(--muted)}
.profit-bar-nums strong{color:var(--green)}
.tag{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.72rem;font-weight:700;margin-left:.3rem}
.tag-est{background:rgba(240,165,0,.15);color:var(--yellow)}
.tag-inv{background:rgba(34,204,102,.15);color:var(--green)}

/* PRINT */
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;position:fixed;inset:0;background:white;z-index:9999;padding:0;margin:0}
}
#printArea{display:none}

/* DOC STYLES */
.doc-paper{background:#fff;color:#1a1a1a;font-family:'Segoe UI',Arial,sans-serif;padding:2rem;min-height:100%}
.doc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
.doc-logo{width:120px;height:auto}
.doc-type-label{font-size:2rem;font-weight:900;color:#1a1a1a;text-align:right;line-height:1}
.doc-type-sub{font-size:.8rem;color:#666;text-align:right;margin-top:.2rem}
.doc-divider{border:none;border-top:3px solid #cc2222;margin:1rem 0}
.doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;font-size:.83rem}
.doc-meta-block strong{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:.3rem}
.doc-meta-block p{line-height:1.6;color:#333}
.doc-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:1.5rem}
.doc-table th{background:#f5f5f5;padding:.6rem .75rem;text-align:left;font-size:.7rem;text-transform:uppercase;color:#777;border-bottom:2px solid #e0e0e0}
.doc-table td{padding:.6rem .75rem;border-bottom:1px solid #eee;color:#333}
.doc-table td:last-child,.doc-table th:last-child{text-align:right}
.doc-totals{margin-left:auto;width:260px;font-size:.85rem}
.doc-total-row{display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid #eee;color:#444}
.doc-total-row.grand{font-size:1rem;font-weight:800;color:#cc2222;border-top:2px solid #cc2222;border-bottom:none;margin-top:.5rem;padding-top:.5rem}
.doc-footer{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #eee;font-size:.75rem;color:#888;text-align:center;line-height:1.6}
.doc-hst{font-size:.72rem;color:#999;margin-top:.3rem}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 100 100" fill="none"><polygon points="50,6 93,40 93,91 7,91 7,40" stroke="#cc2222" stroke-width="7" stroke-linejoin="round"/><line x1="7" y1="91" x2="93" y2="91" stroke="#cc2222" stroke-width="7"/><rect x="33" y="54" width="14" height="37" fill="#cc2222"/><rect x="53" y="54" width="14" height="37" fill="#cc2222"/></svg>
    </div>
    <h1>TNA Pro Build</h1>
    <p>Business Portal — Staff Only</p>
    <input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Sign In</button>
    <p class="login-error" id="loginError">Incorrect password. Try again.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <svg width="24" height="24" viewBox="0 0 100 100" fill="none"><polygon points="50,6 93,40 93,91 7,91 7,40" stroke="#cc2222" stroke-width="7" stroke-linejoin="round"/><rect x="33" y="54" width="14" height="37" fill="#cc2222"/><rect x="53" y="54" width="14" height="37" fill="#cc2222"/></svg>
      <h2 id="pageTitle">Dashboard</h2>
    </div>
    <button class="icon-btn" onclick="logout()" title="Logout">🚪</button>
  </div>

  <!-- DASHBOARD -->
  <div class="page active" id="pageDashboard">
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="statLeads">0</div><div class="lbl">Leads</div></div>
      <div class="stat-card blue"><div class="num" id="statActive">0</div><div class="lbl">Active</div></div>
      <div class="stat-card green"><div class="num" id="statRevenue">$0</div><div class="lbl">Revenue</div></div>
      <div class="stat-card yellow"><div class="num" id="statProfit">$0</div><div class="lbl">Profit</div></div>
    </div>
    <div class="section-title">Active Jobs</div><div id="dashActive"></div>
    <div class="section-title">Quoted Jobs</div><div id="dashQuoted"></div>
    <div class="section-title">Recent Leads</div><div id="dashLeads"></div>
  </div>

  <!-- CLIENTS -->
  <div class="page" id="pageClients">
    <input class="search-bar" placeholder="🔍 Search clients..." oninput="searchClients(this.value)"/>
    <div id="clientsList"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="page" id="pageSchedule">
    <div class="section-title">Upcoming Jobs</div>
    <div id="scheduleList"></div>
  </div>

  <!-- DOCUMENTS -->
  <div class="page" id="pageInvoices">
    <div class="tabs">
      <button class="tab active" onclick="switchDocTab('estimates',this)">📝 Estimates</button>
      <button class="tab" onclick="switchDocTab('invoices',this)">📋 Invoices</button>
    </div>
    <div id="tabInvoices"><div id="invoicesList"></div></div>
    <div id="tabEstimates" style="display:none"><div id="estimatesList"></div></div>
    <div id="tabNewEst" style="display:none"><div id="estForm"></div></div>
    <div id="tabNewInv" style="display:none"><div id="invForm"></div></div>
  </div>

  <!-- EXPENSES -->
  <div class="page" id="pageExpenses">
    <div class="form-group"><label>Filter by Job</label>
      <select id="expFilter" onchange="renderExpenses()"><option value="">All Jobs</option></select>
    </div>
    <div id="expensesList"></div>
    <div class="section-title">Job Profitability</div>
    <div id="profitList"></div>
  </div>

  <button class="fab" onclick="openFAB()">+</button>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('Dashboard')"><span>🏠</span><span>Home</span></button>
    <button class="nav-item" onclick="showPage('Clients')"><span>👥</span><span>Clients</span></button>
    <button class="nav-item" onclick="showPage('Schedule')"><span>📅</span><span>Schedule</span></button>
    <button class="nav-item" onclick="showPage('Invoices')"><span>🧾</span><span>Docs</span></button>
    <button class="nav-item" onclick="showPage('Expenses')"><span>💸</span><span>Expenses</span></button>
  </nav>
</div>

<!-- CLIENT MODAL -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="clientModalTitle">New Client</h3>
      <button class="modal-close" onclick="closeModal('clientModal')">×</button>
    </div>
    <div class="form-group"><label>Full Name *</label><input type="text" id="cName" placeholder="John Smith"/></div>
    <div class="form-group"><label>Phone</label><input type="tel" id="cPhone" placeholder="613-000-0000"/></div>
    <div class="form-group"><label>Email</label><input type="email" id="cEmail" placeholder="client@email.com"/></div>
    <div class="form-group"><label>Address / Area</label><input type="text" id="cAddress" placeholder="123 Main St, Barrhaven"/></div>
    <div class="form-group"><label>Service Type</label>
      <select id="cService">
        <option>Custom Bathroom</option><option>Kitchen Renovation</option><option>Basement Finishing</option>
        <option>Flooring</option><option>Painting</option><option>Deck / Fence / Porch</option>
        <option>Home Addition</option><option>Multiple Services</option><option>Other</option>
      </select>
    </div>
    <div class="form-group"><label>Job Status</label>
      <select id="cStatus">
        <option value="lead">Lead</option><option value="quoted">Quoted</option>
        <option value="active">Active Job</option><option value="complete">Complete</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Start Date</label><input type="date" id="cStart"/></div>
      <div class="form-group"><label>End Date</label><input type="date" id="cEnd"/></div>
    </div>
    <div class="form-group"><label>Quote Amount ($)</label><input type="number" id="cQuote" placeholder="0"/></div>
    <div class="form-group"><label>Returning Client</label>
      <select id="cReturning"><option value="no">No</option><option value="yes">Yes ⭐</option></select>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="cNotes" placeholder="Job details, scope, special requests..."></textarea></div>
    <div class="form-group">
      <label>📷 Job Photos</label>
      <div class="photo-grid" id="clientModalPhotos"></div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button class="btn btn-secondary btn-sm" onclick="triggerCamera('new')">📷 Take Photo</button>
        <button class="btn btn-outline btn-sm" onclick="triggerGallery('new')">🖼️ From Gallery</button>
      </div>
    </div>
    <input type="file" id="cameraNew" accept="image/*" capture="environment" style="display:none" multiple onchange="handleNewPhotos(event)"/>
    <input type="file" id="galleryNew" accept="image/*" style="display:none" multiple onchange="handleNewPhotos(event)"/>
    <button class="btn btn-primary" onclick="saveClient()">💾 Save Client</button>
  </div>
</div>

<!-- CLIENT DETAIL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="detailName">Client</h3>
      <button class="modal-close" onclick="closeModal('detailModal')">×</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- EXPENSE MODAL -->
<div class="modal-overlay" id="expenseModal">
  <div class="modal">
    <div class="modal-header"><h3>Add Expense</h3><button class="modal-close" onclick="closeModal('expenseModal')">×</button></div>
    <div class="form-group"><label>Job / Client</label><select id="expClient"></select></div>
    <div class="form-group"><label>Description</label><input type="text" id="expDesc" placeholder="e.g. Tile from Home Depot"/></div>
    <div class="form-group"><label>Category</label>
      <select id="expCat">
        <option>Materials</option><option>Labour</option><option>Equipment Rental</option>
        <option>Subcontractor</option><option>Fuel / Travel</option><option>Tools</option>
        <option>Permits / Fees</option><option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Amount ($)</label><input type="number" id="expAmount" placeholder="0.00"/></div>
      <div class="form-group"><label>Date</label><input type="date" id="expDate"/></div>
    </div>
    <div class="form-group"><label>Receipt Note</label><input type="text" id="expNote" placeholder="Store, supplier, ref..."/></div>
    <button class="btn btn-primary" onclick="saveExpense()">💾 Save Expense</button>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-header"><h3>Add Communication Log</h3><button class="modal-close" onclick="closeModal('logModal')">×</button></div>
    <div class="form-group"><label>Client</label><select id="logClient"></select></div>
    <div class="form-group"><label>Type</label>
      <select id="logType">
        <option>Phone Call</option><option>Text Message</option><option>Email</option>
        <option>Site Visit</option><option>Meeting</option><option>Other</option>
      </select>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="logNotes" placeholder="What was discussed..."></textarea></div>
    <div class="form-group"><label>Follow Up Date (optional)</label><input type="date" id="logFollowUp"/></div>
    <button class="btn btn-primary" onclick="saveLog()">💾 Save Log</button>
  </div>
</div>

<!-- DOC VIEW MODAL -->

          <option value="no" ${prefill&&prefill.include_hst==='no'?'selected':''}>No HST</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="${type}Notes" placeholder="Payment terms, scope details...">${prefill?prefill.notes||'':''}</textarea></div>

function getDocData(type){
  let sub=0,items=[];
  for(let i=1;i<=docLineCount+10;i++){
    const d=document.getElementById(type+'ld'+i);
    const a=document.getElementById(type+'la'+i);
    if(d&&a){const amt=parseFloat(a.value)||0;items.push({desc:d.value,amt});sub+=amt;}
  }
  const hstEl=document.getElementById(type+'HST');
  const hst=hstEl&&hstEl.value==='yes'?sub*0.13:0;
  const dep=parseFloat((document.getElementById(type+'Dep')||{}).value)||0;
  const client=clients.find(c=>c.id===(document.getElementById(type+'Client')||{}).value);
  return{sub,items,hst,dep,total:sub+hst,balance:sub+hst-dep,
    number:(document.getElementById(type+'Num')||{}).value||'',
    date:(document.getElementById(type+'Date')||{}).value||'',
    due:(document.getElementById(type+'Due')||{}).value||'',
    desc:(document.getElementById(type+'Desc')||{}).value||'',
    notes:(document.getElementById(type+'Notes')||{}).value||'',
    hstInclude:hstEl?hstEl.value:'yes',
    clientId:(document.getElementById(type+'Client')||{}).value||null,
    client};
}

function calcDocTotals(type){
  const d=getDocData(type);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set(type+'SubAmt',fmtMoney(d.sub));
  set(type+'HSTAmt',fmtMoney(d.hst));
  set(type+'DepAmt',fmtMoney(d.dep));
  set(type+'BalAmt',fmtMoney(d.balance));
}

async function saveDoc(type){
  const d=getDocData(type);
  const isEst=type==='estimate';
  const payload={
    client_id:d.clientId||null,
    number:d.number,date:d.date||null,
    valid_until:isEst?null:d.due||null,
    description:d.desc,
    items:JSON.stringify(d.items),
    subtotal:d.sub,hst:d.hst,deposit:d.dep,
    total:d.total,balance:d.balance,
    notes:d.notes,include_hst:d.hstInclude
  };
  const tbl=isEst?'Estimates':'Invoices';
  if(editingDocId&&editingDocType===type){
    await sb.from(tbl).update(payload).eq('id',editingDocId);
    editingDocId=null;editingDocType=null;
    alert((isEst?'Estimate':'Invoice')+' updated!');
  } else {
    await sb.from(tbl).insert(payload);    alert((isEst?'Estimate':'Invoice')+' saved!');
  }
  await loadAll();
}

function buildDocPaper(doc,type,client){
  const isEst=type==='estimate';
  const items=typeof doc.items==='string'?JSON.parse(doc.items||'[]'):doc.items||[];
  return`<div class="doc-paper">
    <div class="doc-top">
      <img src="${CO.logo}" class="doc-logo" alt="TNA Pro Build"/>
      <div><div class="doc-type-label">${isEst?'ESTIMATE':'INVOICE'}</div><div class="doc-type-sub">${doc.number||''}</div></div>
    </div>
    <hr class="doc-divider"/>
    <div class="doc-meta">
      <div class="doc-meta-block"><strong>From</strong><p><strong>${CO.name}</strong><br>${CO.addr}<br>${CO.city}<br>${CO.phone}<br>${CO.email}${!isEst?`<br><small>${CO.hst}</small>`:''}</p></div>
      <div class="doc-meta-block"><strong>Bill To</strong><p>${client?`<strong>${client.name}</strong><br>${client.phone||''}<br>${client.email||''}<br>${client.address||''}`:'—'}</p>
      <div style="margin-top:.75rem"><strong>${isEst?'Project Date':'Invoice Date'}</strong><p>${fmtDate(doc.date)}</p></div>
      ${!isEst&&doc.valid_until?`<div style="margin-top:.5rem"><strong>Due Date</strong><p>${fmtDate(doc.valid_until)}</p></div>`:''}
      </div>
    </div>
    <div class="form-group"><p style="font-size:.85rem;color:#444;font-weight:600">${doc.description||''}</p></div>
    <table class="doc-table"><thead><tr><th>Description</th><th>Amount</th></tr></thead><tbody>
    ${items.map(it=>`<tr><td>${it.desc||''}</td><td>${fmtMoney(it.amt)}</td></tr>`).join('')}
    </tbody></table>
    <div class="doc-totals">
      <div class="doc-total-row"><span>Subtotal</span><span>${fmtMoney(doc.subtotal)}</span></div>
      ${parseFloat(doc.hst)>0?`<div class="doc-total-row"><span>HST (13%)</span><span>${fmtMoney(doc.hst)}</span></div>`:''}
      ${parseFloat(doc.deposit)>0?`<div class="doc-total-row"><span>Deposit Paid</span><span>(${fmtMoney(doc.deposit)})</span></div>`:''}
      <div class="doc-total-row grand"><span>${isEst?'Estimated Total':'Balance Owing'}</span><span>${fmtMoney(doc.balance)}</span></div>
    </div>
    ${doc.notes?`<p style="margin-top:1rem;font-size:.82rem;color:#555">${doc.notes}</p>`:''}
    <div class="doc-footer">Thank you for choosing TNA Pro Build — Quality. Care. Trust.<br>${CO.phone} • ${CO.email}${!isEst?`<div class="doc-hst">${CO.hst}</div>`:''}</div>
  </div>`;
}

function printDocForm(type){
  const d=getDocData(type);
  const doc={number:d.number,date:d.date,valid_until:d.due,description:d.desc,items:d.items,subtotal:d.sub,hst:d.hst,deposit:d.dep,total:d.total,balance:d.balance,notes:d.notes};
  document.getElementById('printArea').innerHTML=buildDocPaper(doc,type,d.client);
  window.print();
}

function emailDocForm(type){
  const d=getDocData(type);
  const isEst=type==='estimate';
  const to=d.client?d.client.email||'':'';
  const subj=encodeURIComponent(`TNA Pro Build — ${isEst?'Estimate':'Invoice'} ${d.number}`);
  const body=encodeURIComponent(`Hi ${d.client?d.client.name:''},\n\nPlease find your ${isEst?'estimate':'invoice'} details below.\n\nJob: ${d.desc}\n${d.items.map(i=>i.desc+': '+fmtMoney(i.amt)).join('\n')}\n\nSubtotal: ${fmtMoney(d.sub)}${d.hst>0?'\nHST (13%): '+fmtMoney(d.hst):''}${d.dep>0?'\nDeposit: '+fmtMoney(d.dep):''}\n${isEst?'Estimated Total':'Balance Owing'}: ${fmtMoney(d.balance)}\n\n${d.notes}\n\nThank you for choosing TNA Pro Build.\nQuality. Care. Trust.\n${CO.phone}`);
  window.location.href=`mailto:${to}?subject=${subj}&body=${body}`;
}

function openDocView(id,type){
  const arr=type==='estimate'?estimates:invoices;
  const doc=arr.find(d=>d.id===id);if(!doc)return;
  currentViewDoc=doc;currentViewType=type;
  const client=clients.find(c=>c.id===doc.client_id);
  document.getElementById('docViewTitle').textContent=type==='estimate'?`Estimate ${doc.number}`:`Invoice ${doc.number}`;
  document.getElementById('docViewContent').innerHTML=buildDocPaper(doc,type,client);
  document.getElementById('dupToInvBtn').style.display=type==='estimate'?'flex':'none';
  openModal('docViewModal');
}

function printCurrentDoc(){
  if(!currentViewDoc)return;
  const client=clients.find(c=>c.id===currentViewDoc.client_id);
  document.getElementById('printArea').innerHTML=buildDocPaper(currentViewDoc,currentViewType,client);
  window.print();
}

function emailCurrentDoc(){
  if(!currentViewDoc)return;
  const doc=currentViewDoc;const type=currentViewType;
  const isEst=type==='estimate';
  const client=clients.find(c=>c.id===doc.client_id);
  const items=typeof doc.items==='string'?JSON.parse(doc.items||'[]'):doc.items||[];
  const to=client?client.email||'':'';
  const subj=encodeURIComponent(`TNA Pro Build — ${isEst?'Estimate':'Invoice'} ${doc.number}`);
  const body=encodeURIComponent(`Hi ${client?client.name:''},\n\nPlease find your ${isEst?'estimate':'invoice'} details below.\n\nJob: ${doc.description||''}\n${items.map(i=>i.desc+': '+fmtMoney(i.amt)).join('\n')}\n\nSubtotal: ${fmtMoney(doc.subtotal)}${parseFloat(doc.hst)>0?'\nHST (13%): '+fmtMoney(doc.hst):''}${parseFloat(doc.deposit)>0?'\nDeposit: '+fmtMoney(doc.deposit):''}\n${isEst?'Estimated Total':'Balance Owing'}: ${fmtMoney(doc.balance)}\n\n${doc.notes||''}\n\nThank you for choosing TNA Pro Build.\nQuality. Care. Trust.\n${CO.phone}`);
  window.location.href=`mailto:${to}?subject=${subj}&body=${body}`;
}

function editCurrentDoc(){
  if(!currentViewDoc)return;
  closeModal('docViewModal');
  const type=currentViewType;
  editingDocId=currentViewDoc.id;
  editingDocType=type;
  if(type==='estimate'){
    showPage('Invoices');
    switchDocTab('newEst',document.querySelectorAll('.tab')[2]);
    initDocForm('estimate',currentViewDoc);
  } else {
    showPage('Invoices');
    switchDocTab('newInv',document.querySelectorAll('.tab')[3]);
    initDocForm('invoice',currentViewDoc);
  }
}

async function duplicateToInvoice(){
  if(!currentViewDoc||currentViewType!=='estimate')return;
  if(!confirm('Duplicate this estimate as a new invoice? The original estimate will be kept.'))return;
  const est=currentViewDoc;
  const newNum=genNum(invoices,'INV-');
  const payload={
    client_id:est.client_id,number:newNum,
    date:today(),valid_until:null,
    description:est.description,items:est.items,
    subtotal:est.subtotal,hst:est.hst,deposit:est.deposit,
    total:est.total,balance:est.balance,
    notes:est.notes,include_hst:est.include_hst
  };
  const res=await sb.from('Invoices').insert(payload).select();
  await loadAll();
  alert('Invoice '+newNum+' created! Original estimate kept.');
  closeModal('docViewModal');
  if(res.data&&res.data[0])openDocView(res.data[0].id,'invoice');
}

function renderInvoices(){
  populateClientSelect('estimateClient');
  populateClientSelect('invoiceClient');
  document.getElementById('invoicesList').innerHTML=invoices.length?invoices.map(inv=>{
    const c=clients.find(cl=>cl.id===inv.client_id);
    return`<div class="list-item" onclick="openDocView('${inv.id}','invoice')">
      <div class="list-item-left"><h4>${inv.number}<span class="tag tag-inv">INV</span></h4><p>${inv.description||''} • ${fmtDate(inv.date)}</p></div>
      <div class="list-item-right"><strong class="amount-green">${fmtMoney(inv.total)}</strong><span>${c?c.name:'—'}</span></div>
    </div>`;
  }).join(''):'<div class="empty-state"><span>🧾</span><p>No invoices yet</p></div>';

  document.getElementById('estimatesList').innerHTML=estimates.length?estimates.map(est=>{
    const c=clients.find(cl=>cl.id===est.client_id);
    return`<div class="list-item" onclick="openDocView('${est.id}','estimate')">
      <div class="list-item-left"><h4>${est.number}<span class="tag tag-est">EST</span></h4><p>${est.description||''} • ${fmtDate(est.date)}</p></div>
      <div class="list-item-right"><strong>${fmtMoney(est.total)}</strong><span>${c?c.name:'—'}</span></div>
    </div>`;
  }).join(''):'<div class="empty-state"><span>📝</span><p>No estimates yet</p></div>';
}

// EXPENSES
function openExpModal(){
  document.getElementById('expDate').value=today();
  populateClientSelect('expClient');
  openModal('expenseModal');
}

async function saveExpense(){
  await sb.from('Expenses').insert({
    client_id:document.getElementById('expClient').value||null,
    description:document.getElementById('expDesc').value,
    category:document.getElementById('expCat').value,
    amount:document.getElementById('expAmount').value||0,
    date:document.getElementById('expDate').value||null,
    note:document.getElementById('expNote').value
  });
  closeModal('expenseModal');
  await loadAll();
}

function renderExpenses(){
  populateClientSelect('expFilter',true);
  populateClientSelect('expClient');
  const filter=document.getElementById('expFilter').value;
  const list=expenses.filter(e=>!filter||e.client_id===filter);
  document.getElementById('expensesList').innerHTML=list.length?list.map(e=>{
    const c=clients.find(cl=>cl.id===e.client_id);
    return`<div class="list-item">
      <div class="list-item-left"><h4>${e.description||'Expense'}</h4><p>${e.category||''}${c?' — '+c.name:''} • ${e.note||''}</p></div>
      <div class="list-item-right"><strong>${fmtMoney(e.amount)}</strong><span>${fmtDate(e.date)}</span></div>
    </div>`;
  }).join(''):'<div class="empty-state"><span>💸</span><p>No expenses yet</p></div>';

  const acJobs=clients.filter(c=>c.status==='active'||c.status==='complete');
  document.getElementById('profitList').innerHTML=acJobs.length?acJobs.map(c=>{
    const rev=invoices.filter(i=>i.client_id===c.id).reduce((s,i)=>s+(parseFloat(i.total)||0),0);
    const exp=expenses.filter(e=>e.client_id===c.id).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const profit=rev-exp;
    const pct=rev>0?Math.min(100,Math.max(0,profit/rev*100)):0;
    return`<div class="profit-bar">
      <h4>${c.name} — ${c.service||''}</h4>
      <div class="profit-bar-track"><div class="profit-bar-fill" style="width:${pct}%"></div></div>
      <div class="profit-bar-nums"><span>Revenue: ${fmtMoney(rev)}</span><span>Expenses: ${fmtMoney(exp)}</span><strong>Profit: ${fmtMoney(profit)}</strong></div>
    </div>`;
  }).join(''):'<div class="empty-state"><span>📊</span><p>Profitability shows for active & complete jobs</p></div>';
}

// LOGS
function openLogFor(id){
  closeModal('detailModal');
  populateClientSelect('logClient');
  document.getElementById('logClient').value=id;
  openModal('logModal');
}

async function saveLog(){
  await sb.from('Logs').insert({
    client_id:document.getElementById('logClient').value||null,
    type:document.getElementById('logType').value,
    notes:document.getElementById('logNotes').value,
    follow_up:document.getElementById('logFollowUp').value||null
  });
  closeModal('logModal');
  await loadAll();
  if(currentDetailId)openDetail(currentDetailId);
}

// HELPERS
function populateClientSelect(id,includeAll=false){
  const sel=document.getElementById(id);if(!sel)return;
  const cur=sel.value;
  sel.innerHTML=(includeAll?'<option value="">All Jobs</option>':'<option value="">Select client...</option>')+
    clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  if(cur)sel.value=cur;
}

function populateAllSelects(){
  ['estimateClient','invoiceClient','expClient','expFilter','logClient'].forEach((id,i)=>populateClientSelect(id,i===3));
}
